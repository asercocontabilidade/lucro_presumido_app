services:

  # ─── lucro-presumido ──────────────────────────────────────────────────────
  lucro-backend:
    build:
      context: ./lucro-presumido/backend
      dockerfile: Dockerfile
    container_name: lucro-presumido-backend
    restart: unless-stopped
    ports:
      - "3004:3001"
    env_file:
      - ./lucro-presumido/backend/.env
    networks:
      - app-network

  lucro-frontend:
    build:
      context: ./lucro-presumido/frontend
      dockerfile: Dockerfile
    container_name: lucro-presumido-frontend
    restart: unless-stopped
    ports:
      - "3006:80"
    depends_on:
      - lucro-backend
    networks:
      - app-network

  # ─── regularize-toriotools ────────────────────────────────────────────────
  regularize:
    build:
      context: ./regularize-toriotools
      dockerfile: Dockerfile
    container_name: regularize-toriotools-app
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - PORT=3005
    env_file:
      - ./regularize-toriotools/.env
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
